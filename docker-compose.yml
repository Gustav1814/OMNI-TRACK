# OmniTrack AI — Full Stack (Industry-Standard Prototype)
# Run: docker compose up -d --build
# Dashboard: http://localhost:3000 (frontend) | API: http://localhost:8000/docs
#
# If 5432/6379 are in use, stop conflicting containers first, e.g.:
#   docker rm -f omnitrack-db omnitrack-redis

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: omnitrack-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: omnitrack
      POSTGRES_PASSWORD: omnitrack_secret
      POSTGRES_DB: omnitrack_db
    ports:
      - "5432:5432"
    volumes:
      - omnitrack_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omnitrack -d omnitrack_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: omnitrack-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  kafka:
    image: bitnami/kafka:3.7
    container_name: omnitrack-kafka
    environment:
      KAFKA_ENABLE_KRAFT: "yes"
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_NODE_ID: "1"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      # Use broker hostname so other Compose services can connect (not localhost)
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_KRAFT_CLUSTER_ID: MDEyMzQ1Njc4OTAxMjM0NQ
    ports:
      - "9092:9092"
    profiles:
      - kafka

  qdrant:
    image: qdrant/qdrant:latest
    container_name: omnitrack-qdrant
    ports:
      - "6333:6333"
    volumes:
      - omnitrack_qdrant:/qdrant/storage
    profiles:
      - qdrant

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: omnitrack-api
    restart: unless-stopped
    volumes:
      # Weights are dockerignored (*.pt); mount host dir so YOLO/SAM models are available
      - ./backend/model_weight:/app/model_weight
      - ./backend/storage:/app/storage
      - ./backend/exports:/app/exports
    environment:
      DATABASE_URL: postgresql+asyncpg://omnitrack:omnitrack_secret@postgres:5432/omnitrack_db
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-this-in-production}
      CORS_ORIGINS: '["http://localhost","http://localhost:80","http://localhost:3000","http://localhost:5173","http://frontend"]'
    ports:
      - "8000:8000"
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: omnitrack-dashboard
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

  # Optional: single entrypoint reverse proxy (production-style)
  nginx:
    image: nginx:alpine
    container_name: omnitrack-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    profiles:
      - with-nginx

volumes:
  omnitrack_pgdata:
  omnitrack_qdrant:
