# OmniTrack AI — Infrastructure-only stack
# ─────────────────────────────────────────────────────────────
# Provides ONLY the two stateful services the backend needs:
#   - Postgres (with pgvector extension) on :5432
#   - Redis 7                           on :6379
#
# The backend and frontend run on the host (uvicorn / vite) — not in Docker.
#
# Quick start:
#   docker compose up -d
#   docker compose ps
#   docker compose down            # stop
#   docker compose down -v         # stop + wipe DB volume
#
# Match these with backend/.env:
#   DATABASE_URL=postgresql+asyncpg://omnitrack:omnitrack_secret@localhost:5432/omnitrack_db
#   REDIS_URL=redis://localhost:6379/0

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: omnitrack-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: omnitrack
      POSTGRES_PASSWORD: omnitrack_secret
      POSTGRES_DB: omnitrack_db
    ports:
      - "5432:5432"
    volumes:
      - omnitrack_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omnitrack -d omnitrack_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: omnitrack-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  omnitrack_pgdata:
