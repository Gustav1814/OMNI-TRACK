# OmniTrack AI — Reverse proxy (use with: docker compose --profile with-nginx up)
# Single entrypoint: http://localhost → frontend, /api → backend, /ws → backend

server {
    listen 80;
    server_name localhost;
    client_max_body_size 50M;

    # Frontend (React SPA)
    location / {
        proxy_pass http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend API
    location /api {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # WebSocket
    location /ws {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # OpenAPI docs (optional)
    location /docs { proxy_pass http://backend:8000; proxy_set_header Host $host; }
    location /redoc { proxy_pass http://backend:8000; proxy_set_header Host $host; }
    location /openapi.json { proxy_pass http://backend:8000; proxy_set_header Host $host; }
}
